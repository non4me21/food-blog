name: Deploy to Railway

on:
  push:
    branches:
      - master

jobs:
  check:
    name: Type check & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  approve:
    name: Approve deploy
    needs: check
    runs-on: ubuntu-latest
    environment: production

    steps:
      - run: echo "Approved — Railway will now deploy"
