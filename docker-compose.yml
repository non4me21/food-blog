services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app/backend
      - chroma_db:/app/backend/chroma_db
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  next-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AI_SEARCH_URL: http://backend:8000
      BUCKET_ENDPOINT: ${BUCKET_ENDPOINT}
      BUCKET_ACCESS_KEY_ID: ${BUCKET_ACCESS_KEY_ID}
      BUCKET_SECRET_ACCESS_KEY: ${BUCKET_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${BUCKET_NAME}
      BUCKET_PUBLIC_URL: ${BUCKET_PUBLIC_URL}
    command: sh -c "npx drizzle-kit migrate && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  chroma_db:
  redis_data:
  postgres_data:
